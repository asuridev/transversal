<!-- Backdrop invisible: cierra al hacer click afuera sin @HostListener (zoneless) -->
@if (isOpen()) {
  <button
    type="button"
    tabindex="-1"
    aria-hidden="true"
    class="fixed inset-0 z-10 cursor-default"
    (click)="close()"
  ></button>
}

<!-- Trigger: réplica del input Figma (56px, borde text-muted, radio 4, texto 16px) + icono calendario -->
<button
  type="button"
  [disabled]="disabled()"
  [attr.aria-expanded]="isOpen()"
  aria-haspopup="dialog"
  class="relative flex h-14 w-full items-center justify-between gap-2 rounded-[4px] border border-text-muted bg-transparent px-4 text-left focus:outline-none disabled:cursor-not-allowed"
  [class.z-20]="isOpen()"
  (click)="onClick($event)"
>
  <!-- Label flotante: placeholder centrado en reposo; sube a 12px al enfocar/tener valor -->
  <span
    class="pointer-events-none absolute left-4 origin-left text-text-muted transition-all duration-200 ease-out"
    [class]="{
      'top-1/2': !floated(),
      '-translate-y-1/2': !floated(),
      'text-base': !floated(),
      'top-2': floated(),
      'text-xs': floated(),
      'leading-5': floated()
    }"
    >{{ placeholder() }}</span
  >
  <!-- Fecha seleccionada DD/MM/AAAA (16px, text-strong), debajo del label flotado -->
  @if (hasValue()) {
    <span class="truncate pt-[18px] text-base text-text-strong">{{ displayLabel() }}</span>
  }
  <svg viewBox="0 0 24 24" fill="none" class="ml-auto h-4 w-4 shrink-0 text-text-muted" aria-hidden="true">
    <rect x="3" y="4.5" width="18" height="16.5" rx="2" stroke="currentColor" stroke-width="1.6" />
    <path d="M3 9h18M8 2.5v4M16 2.5v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
  </svg>
</button>

<!-- Popover calendario (Figma 12286:175262): mismo render en desktop/tablet/mobile -->
@if (isOpen()) {
  <div
    role="dialog"
    aria-label="Seleccionar fecha"
    class="absolute left-0 top-full z-20 mt-2 flex flex-col gap-[22px] rounded-[8px] bg-surface p-6 shadow-[2px_16px_19px_0px_rgba(0,0,0,0.09)]"
  >
    <!-- Encabezado: chevron anterior / Mes Año / chevron siguiente -->
    <div class="flex items-center justify-between">
      <button
        type="button"
        aria-label="Mes anterior"
        class="flex h-4 w-4 items-center justify-center text-text-strong"
        (click)="prevMonth()"
      >
        <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
          <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <p class="text-center text-sm font-bold leading-[14px] text-text-strong">{{ monthLabel() }}</p>
      <button
        type="button"
        aria-label="Mes siguiente"
        [disabled]="!canGoNext()"
        class="flex h-4 w-4 items-center justify-center text-text-strong"
        [class.opacity-40]="!canGoNext()"
        [class.cursor-not-allowed]="!canGoNext()"
        (click)="nextMonth()"
      >
        <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
          <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <!-- Etiquetas de día (Poppins 10, uppercase, tracking 1.5, text-muted) -->
    <div class="grid grid-cols-7 gap-2">
      @for (label of weekdayLabels; track label) {
        <span class="flex h-5 w-[30px] items-center justify-center text-center text-[10px] uppercase leading-3 tracking-[1.5px] text-text-muted">
          {{ label }}
        </span>
      }
    </div>

    <!-- Grilla de semanas: celdas 30px; día seleccionado = círculo primario de marca -->
    <div class="flex flex-col gap-2">
      @for (week of weeks(); track $index) {
        <div class="grid grid-cols-7 gap-2">
          @for (cell of week; track $index) {
            @if (cell) {
              <button
                type="button"
                [disabled]="cell.disabled"
                class="flex size-[30px] items-center justify-center rounded-full text-center text-base leading-[18px] focus:outline-none"
                [class.bg-primary]="cell.iso === value()"
                [class.text-white]="cell.iso === value()"
                [class.text-text-strong]="cell.iso !== value()"
                [class.opacity-40]="cell.disabled"
                [class.cursor-not-allowed]="cell.disabled"
                [attr.aria-pressed]="cell.iso === value()"
                (click)="select(cell)"
              >
                {{ cell.day }}
              </button>
            } @else {
              <span class="size-[30px]"></span>
            }
          }
        </div>
      }
    </div>
  </div>
}
